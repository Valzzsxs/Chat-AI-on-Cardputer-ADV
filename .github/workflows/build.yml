name: Build PlatformIO

on:
  push:
    branches: [ "*" ]
  release:
    types: [published, created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Build cardputer_chat
        working-directory: ./cardputer_chat
        run: pio run

      - name: Build cardputer_ncvd
        working-directory: ./cardputer_ncvd
        run: pio run

      - name: Upload cardputer_chat artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-chat
          path: cardputer_chat/.pio/build/*/firmware.bin

      - name: Upload cardputer_ncvd artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-ncvd
          path: cardputer_ncvd/.pio/build/*/firmware.bin

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Chat Firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware-chat
          path: chat_temp

      - name: Download NCVD Firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware-ncvd
          path: ncvd_temp

      - name: Prepare bin directory
        run: |
          mkdir -p bin
          mv chat_temp/firmware.bin bin/cardputer_chat.bin || true
          mv ncvd_temp/firmware.bin bin/cardputer_ncvd.bin || true
          cd bin && ls *.bin | jq -R -s -c 'split("\n")[:-1]' > ../firmwares.json && cd ..

      - name: Commit updated firmwares.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add firmwares.json
          git add bin/*.bin || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update firmwares.json and bin/ [skip ci]" && git push)

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
